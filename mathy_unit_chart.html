<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATHY YURI — 단원 클리어 현황</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,600&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ee;
    --bg2: #e8ede5;
    --card: #ffffff;
    --card2: #f7f9f5;
    --border: #dce4d8;
    --border2: #c8d4c2;
    --accent: #5a7a4e;
    --accent-light: #7a9e6c;
    --accent-pale: #d4e4cc;
    --text: #2a3226;
    --text-muted: #7a8c74;
    --text-dim: #a0b09a;
    --s-color: #4a7a9b;
    --sp-color: #7a5a9b;
    --clear-bg: #e8f2e4;
    --clear-border: #9dc48c;
    --clear-text: #3d6e30;
    --partial-bg: #fef5e4;
    --partial-border: #e8c87a;
    --partial-text: #7a5a1a;
    --none-bg: #f5f5f3;
    --none-border: #ddd;
    --open-bg: #e8f0e4;
    --open-text: #5a7a4e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; min-height: 100vh; }
  .page { max-width: 1080px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* HEADER */
  .site-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2rem; gap: 1rem; flex-wrap: wrap; }
  .logo-main { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 30px; letter-spacing: 1px; color: var(--text); line-height: 1; }
  .logo-sub { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 600; font-size: 22px; color: var(--accent); line-height: 1.3; }
  .logo-tag { font-size: 10px; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-top: 4px; }
  .refresh-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--border2); color: var(--text-muted); font-size: 12px; padding: 7px 16px; border-radius: 20px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.2s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* SUMMARY */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.8rem; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.2rem; position: relative; overflow: hidden; }
  .stat-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; border-radius: 0 0 14px 14px; }
  .stat-card.total::after { background: var(--accent); }
  .stat-card.s-class::after { background: var(--s-color); }
  .stat-card.sp-class::after { background: var(--sp-color); }
  .stat-card.units-card::after { background: var(--accent-light); }
  .stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .stat-num { font-size: 32px; font-weight: 700; font-family: 'Playfair Display', serif; line-height: 1; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

  /* CONTROLS */
  .controls { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
  .ctrl-group { display: flex; gap: 1px; background: var(--border); border-radius: 10px; padding: 2px; }
  .ctrl-btn { background: transparent; border: none; color: var(--text-muted); font-size: 12px; padding: 6px 14px; cursor: pointer; border-radius: 8px; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .ctrl-btn:hover { color: var(--text); background: var(--card2); }
  .ctrl-btn.active { background: var(--card); color: var(--accent); font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .ctrl-sep { width: 1px; background: var(--border); margin: 0 4px; align-self: stretch; }
  .ctrl-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; font-family: 'DM Mono', monospace; align-self: center; }

  /* MAIN CARD */
  .main-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 1.8rem; box-shadow: 0 2px 16px rgba(90,122,78,0.06); }
  .section-heading { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 10px; }
  .section-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* LEGEND */
  .legend { display: flex; gap: 14px; margin-bottom: 1.2rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 14px; height: 14px; border-radius: 4px; }
  .open-tag { font-size: 9px; font-family: 'DM Mono', monospace; letter-spacing: 1px; background: var(--open-bg); color: var(--open-text); border: 1px solid var(--accent-pale); padding: 2px 8px; border-radius: 20px; }

  /* HEATMAP */
  .heatmap-overflow { overflow-x: auto; }
  .heatmap-table { border-collapse: separate; border-spacing: 3px; min-width: 480px; }
  .heatmap-table th { font-size: 9px; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 400; padding: 0 2px 10px; text-align: center; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .heatmap-table th.name-th { text-align: left; padding-left: 4px; min-width: 110px; }
  .heatmap-table td { padding: 2px; }
  .heatmap-table td.name-td { padding: 2px 14px 2px 4px; white-space: nowrap; }
  .name-wrap { display: flex; align-items: center; gap: 7px; }
  .name-text { font-size: 13px; color: var(--text); }
  .class-badge { font-size: 9px; font-family: 'DM Mono', monospace; font-weight: 500; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.5px; }
  .badge-s { background: #e4eef5; color: var(--s-color); border: 1px solid #b8d0e0; }
  .badge-sp { background: #ede4f5; color: var(--sp-color); border: 1px solid #cdb8e0; }
  .cell { width: 36px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: 'DM Mono', monospace; cursor: default; transition: transform 0.15s; }
  .cell:hover { transform: scale(1.12); }
  .cell-clear { background: var(--clear-bg); border: 1px solid var(--clear-border); color: var(--clear-text); font-weight: 500; }
  .cell-partial { background: var(--partial-bg); border: 1px solid var(--partial-border); color: var(--partial-text); }
  .cell-none { background: var(--none-bg); border: 1px solid var(--none-border); color: var(--text-dim); }
  .pct-cell { font-size: 11px; font-family: 'DM Mono', monospace; text-align: center; padding-left: 8px; white-space: nowrap; }

  /* UNIT BAR */
  .bar-list { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 12px; }
  .bar-label { font-size: 12px; color: var(--text-muted); min-width: 160px; text-align: right; font-family: 'DM Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 22px; background: var(--bg2); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 10px; transition: width 0.9s cubic-bezier(0.16,1,0.3,1); min-width: 0; }
  .bar-fill-text { font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500; color: #fff; white-space: nowrap; }
  .bar-meta { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; min-width: 40px; text-align: right; }

  /* STUDENT BAR */
  .sbar-list { display: flex; flex-direction: column; gap: 8px; }
  .sbar-row { display: flex; align-items: center; gap: 10px; }
  .sbar-name { min-width: 75px; font-size: 13px; color: var(--text); text-align: right; }
  .sbar-badge { min-width: 50px; }
  .sbar-track { flex: 1; height: 24px; background: var(--bg2); border-radius: 6px; overflow: hidden; }
  .sbar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 10px; transition: width 0.9s cubic-bezier(0.16,1,0.3,1); min-width: 0; }
  .sbar-fill-text { font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 500; color: #fff; white-space: nowrap; }
  .sbar-pct { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; min-width: 40px; text-align: right; }

  /* STATUS */
  .status-wrap { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 13px; line-height: 2; }
  .loading-dots::after { content: ''; animation: dots 1.2s infinite steps(4, end); }
  @keyframes dots { 0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}100%{content:'...'} }
  .error-text { color: #b05a5a; }

  @media (max-width: 600px) {
    .bar-label { min-width: 110px; font-size: 10px; }
    .sbar-name { min-width: 56px; font-size: 12px; }
    .stat-num { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <div>
      <div class="logo-main">MATHY YURI</div>
      <div class="logo-sub">System</div>
      <div class="logo-tag">DAECHI S+ ACADEMY</div>
    </div>
    <button class="refresh-btn" onclick="init()">↺ 새로고침</button>
  </header>

  <div class="summary-grid">
    <div class="stat-card total">
      <div class="stat-label">STUDENTS</div>
      <div class="stat-num" id="s-total">—</div>
      <div class="stat-sub">S반 + S+반 전체</div>
    </div>
    <div class="stat-card s-class">
      <div class="stat-label">S 반</div>
      <div class="stat-num" id="s-scount">—</div>
      <div class="stat-sub">학생 수</div>
    </div>
    <div class="stat-card sp-class">
      <div class="stat-label">S+ 반</div>
      <div class="stat-num" id="s-spcount">—</div>
      <div class="stat-sub">학생 수</div>
    </div>
    <div class="stat-card units-card">
      <div class="stat-label">UNITS</div>
      <div class="stat-num" id="s-units">—</div>
      <div class="stat-sub">진행 중인 단원</div>
    </div>
  </div>

  <div class="controls">
    <span class="ctrl-label">반</span>
    <div class="ctrl-group" id="classFilter">
      <button class="ctrl-btn active" data-class="all">전체</button>
      <button class="ctrl-btn" data-class="S반">S 반</button>
      <button class="ctrl-btn" data-class="S+반">S+ 반</button>
    </div>
    <div class="ctrl-sep"></div>
    <span class="ctrl-label">보기</span>
    <div class="ctrl-group" id="viewFilter">
      <button class="ctrl-btn active" data-view="heatmap">히트맵</button>
      <button class="ctrl-btn" data-view="unitbar">단원별 클리어율</button>
      <button class="ctrl-btn" data-view="studentbar">학생별 달성률</button>
    </div>
  </div>

  <div class="main-card" id="mainContent">
    <div class="status-wrap"><span class="loading-dots">데이터 로딩 중</span></div>
  </div>

</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbw55UMUvuqNmQq9oNFI9JTnTlD7zD6EXJdZjywHz8ya0Vlqu7Bknj0bo3PA1WshYl7QkQ/exec';
let currentClass = 'all', currentView = 'heatmap';

function parseRows(d) {
  if (Array.isArray(d)) {
    if (d.length && typeof d[0] === 'object' && !Array.isArray(d[0])) return d;
    if (d.length && Array.isArray(d[0])) {
      const h = d[0];
      return d.slice(1).map(r => { const o = {}; h.forEach((k,i) => o[k] = r[i]); return o; });
    }
  }
  if (d && Array.isArray(d.data)) return d.data;
  if (d && Array.isArray(d.rows)) return d.rows;
  return [];
}

function buildStudentMap(rows) {
  // S반, S+반만 필터
  const filtered = rows.filter(r => {
    const c = String(r['반'] || '').trim();
    return c === 'S반' || c === 'S+반';
  });
  // 단원별 전체 최고점 (만점 기준)
  const unitMax = {};
  filtered.forEach(r => {
    const u = String(r['단원'] || '').trim();
    const sc = Number(r['점수']) || 0;
    if (u && (!unitMax[u] || sc > unitMax[u])) unitMax[u] = sc;
  });
  // 학생별 단원별 최고점
  const map = {};
  filtered.forEach(r => {
    const name = String(r['이름'] || '').trim();
    const cls  = String(r['반'] || '').trim();
    const unit = String(r['단원'] || '').trim();
    const sc   = Number(r['점수']) || 0;
    if (!name || !unit) return;
    const key = name + '|' + cls;
    if (!map[key]) map[key] = { name, class: cls, units: {} };
    if (sc > (map[key].units[unit] || 0)) map[key].units[unit] = sc;
  });
  return { studentMap: map, unitMax };
}

function isCleared(s, u, um) {
  const my = s.units[u] || 0, mx = um[u] || 0;
  return mx > 0 && my >= mx;
}

function getFiltered(map) {
  return Object.values(map).filter(s => currentClass === 'all' ? true : s.class === currentClass);
}

function shortUnit(u) {
  return u.replace('방정식_Writing_', '방정식 W')
          .replace('부등식_Writing_', '부등식 W')
          .replace('경우의수_Writing_', '경우의수 W');
}

/* ── 히트맵 ── */
function renderHeatmap(students, unitMax) {
  const units = Object.keys(unitMax).sort();
  const sorted = [...students].sort((a, b) => {
    if (a.class !== b.class) return a.class === 'S+반' ? -1 : 1;
    return a.name.localeCompare(b.name, 'ko');
  });

  let h = `
    <div class="section-heading">WRITING TRAINING — 단원 클리어 현황</div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:var(--clear-bg);border:1px solid var(--clear-border)"></span>클리어 (만점)</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--partial-bg);border:1px solid var(--partial-border)"></span>도전 중</span>
      <span class="legend-item"><span class="legend-dot" style="background:var(--none-bg);border:1px solid var(--none-border)"></span>미응시</span>
    </div>
    <div class="heatmap-overflow">
    <table class="heatmap-table">
      <thead><tr>
        <th class="name-th">학생</th>
        ${units.map(u => `<th title="${u}">${shortUnit(u)}</th>`).join('')}
        <th>달성률</th>
      </tr></thead>
      <tbody>`;

  sorted.forEach(s => {
    const bc = s.class === 'S+반' ? 'badge-sp' : 'badge-s';
    const cl = units.filter(u => isCleared(s, u, unitMax)).length;
    const pct = units.length ? Math.round(cl / units.length * 100) : 0;
    const pc = pct === 100 ? 'var(--clear-text)' : pct >= 50 ? 'var(--accent)' : 'var(--text-muted)';

    h += `<tr>
      <td class="name-td"><div class="name-wrap">
        <span class="name-text">${s.name}</span>
        <span class="class-badge ${bc}">${s.class}</span>
      </div></td>`;

    units.forEach(u => {
      const my = s.units[u] || 0, mx = unitMax[u] || 0;
      const cleared = isCleared(s, u, unitMax), tried = my > 0 && !cleared;
      const cls = cleared ? 'cell-clear' : tried ? 'cell-partial' : 'cell-none';
      const icon = cleared ? '✓' : tried ? String(my) : '·';
      const tip = cleared ? `클리어! (${my}점)` : tried ? `${my}점 / 만점 ${mx}점` : '미응시';
      h += `<td title="${u}\n${tip}"><div class="cell ${cls}">${icon}</div></td>`;
    });

    h += `<td class="pct-cell" style="color:${pc};font-weight:${pct===100?500:400}">${pct}%</td></tr>`;
  });

  h += `</tbody></table></div>`;
  return h;
}

/* ── 단원별 클리어율 ── */
function renderUnitBar(students, unitMax) {
  const units = Object.keys(unitMax).sort();
  const n = students.length;
  let h = `<div class="section-heading">단원별 클리어율</div><div class="bar-list">`;

  units.forEach(u => {
    const cnt = students.filter(s => isCleared(s, u, unitMax)).length;
    const pct = n ? Math.round(cnt / n * 100) : 0;
    const color = pct >= 80 ? '#6aab5c' : pct >= 50 ? '#7a9e6c' : '#9ab8a4';
    h += `<div class="bar-row">
      <div class="bar-label" title="${u}">${shortUnit(u)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${color}">
          <span class="bar-fill-text">${pct > 12 ? pct + '%' : ''}</span>
        </div>
      </div>
      <div class="bar-meta">${cnt} / ${n}명</div>
    </div>`;
  });
  return h + `</div>`;
}

/* ── 학생별 달성률 ── */
function renderStudentBar(students, unitMax) {
  const units = Object.keys(unitMax).sort();
  const total = units.length;
  const sorted = [...students].sort((a, b) => {
    const ca = units.filter(u => isCleared(a, u, unitMax)).length;
    const cb = units.filter(u => isCleared(b, u, unitMax)).length;
    if (cb !== ca) return cb - ca;
    if (a.class !== b.class) return a.class === 'S+반' ? -1 : 1;
    return a.name.localeCompare(b.name, 'ko');
  });

  let h = `<div class="section-heading">학생별 클리어 달성률</div><div class="sbar-list">`;
  sorted.forEach(s => {
    const cnt = units.filter(u => isCleared(s, u, unitMax)).length;
    const pct = total ? Math.round(cnt / total * 100) : 0;
    const color = s.class === 'S+반' ? '#9a7abc' : '#6a9abc';
    const bc = s.class === 'S+반' ? 'badge-sp' : 'badge-s';
    h += `<div class="sbar-row">
      <div class="sbar-name">${s.name}</div>
      <div class="sbar-badge"><span class="class-badge ${bc}">${s.class}</span></div>
      <div class="sbar-track">
        <div class="sbar-fill" style="width:${pct}%;background:${color}">
          <span class="sbar-fill-text">${pct > 8 ? cnt + '단원' : ''}</span>
        </div>
      </div>
      <div class="sbar-pct">${pct}%</div>
    </div>`;
  });
  return h + `</div>`;
}

/* ── 전체 렌더 ── */
function renderAll(sm, um) {
  const all = Object.values(sm);
  document.getElementById('s-total').textContent = all.length;
  document.getElementById('s-scount').textContent = all.filter(s => s.class === 'S반').length;
  document.getElementById('s-spcount').textContent = all.filter(s => s.class === 'S+반').length;
  document.getElementById('s-units').textContent = Object.keys(um).length;

  const students = getFiltered(sm);
  let html = '';
  if (currentView === 'heatmap') html = renderHeatmap(students, um);
  else if (currentView === 'unitbar') html = renderUnitBar(students, um);
  else html = renderStudentBar(students, um);
  document.getElementById('mainContent').innerHTML = html;

  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill, .sbar-fill').forEach(el => {
      const w = el.style.width; el.style.width = '0';
      requestAnimationFrame(() => { el.style.width = w; });
    });
  });
}

/* ── 컨트롤 ── */
document.getElementById('classFilter').addEventListener('click', e => {
  const b = e.target.closest('.ctrl-btn'); if (!b) return;
  document.querySelectorAll('#classFilter .ctrl-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); currentClass = b.dataset.class;
  if (window._sm) renderAll(window._sm, window._um);
});
document.getElementById('viewFilter').addEventListener('click', e => {
  const b = e.target.closest('.ctrl-btn'); if (!b) return;
  document.querySelectorAll('#viewFilter .ctrl-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); currentView = b.dataset.view;
  if (window._sm) renderAll(window._sm, window._um);
});

/* ── 초기화 ── */
async function init() {
  document.getElementById('mainContent').innerHTML = '<div class="status-wrap"><span class="loading-dots">데이터 로딩 중</span></div>';
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const rows = parseRows(json);
    if (!rows.length) throw new Error('데이터가 없습니다');
    const { studentMap, unitMax } = buildStudentMap(rows);
    window._sm = studentMap; window._um = unitMax;
    renderAll(studentMap, unitMax);
  } catch(err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="status-wrap">
        <span class="error-text">데이터를 불러오지 못했습니다</span><br>
        <span style="font-size:11px">${err.message}</span><br>
        <span style="font-size:11px;color:var(--text-dim)">Apps Script 배포 설정(모든 사용자 공개)을 확인해주세요</span>
      </div>`;
  }
}

init();
</script>
</body>
</html>
