<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>S+ Writing Ranking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#edf5ea; --card:#fcfefc; --line:#d9e7d5;
  --main:#233222; --sub:#6f7d6c; --point:#7da27b;
  --gold-grad: linear-gradient(135deg, #d4af37 0%, #f7ef8a 50%, #d4af37 100%);
  --silver-grad: linear-gradient(135deg, #a8a8a8 0%, #e0e0e0 50%, #a8a8a8 100%);
  --bronze-grad: linear-gradient(135deg, #a0522d 0%, #cd7f32 50%, #a0522d 100%);
}
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body{ background:var(--bg); font-family:'Noto Sans KR', sans-serif; color:var(--main); padding:40px 20px 80px; line-height: 1.5; }
.container{ max-width:900px; margin:auto; }

/* HEADER */
.header{ text-align:center; margin-bottom:50px; }
.logo{ font-family:'Cormorant Garamond', serif; font-size:56px; line-height:1.1; font-weight:600; margin-bottom:12px; letter-spacing:-1px; }
.logo span{ color:var(--point); font-style:italic; }
.sub{ color:var(--sub); font-size:12px; letter-spacing:0.2em; font-weight:500; text-transform:uppercase; }

/* PREMIUM TOP 3 SECTION */
.top-ranking { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-bottom: 50px; padding: 10px; }
.rank-card { 
  background: var(--card); border: 1px solid var(--line); border-radius: 24px; 
  padding: 30px 20px; text-align: center; box-shadow: 0 12px 30px rgba(40,60,40,0.06); 
  position: relative; transition: all 0.3s ease; flex: 1;
}

.rank-badge {
  width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 15px; font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 20px; color: #fff;
}

.rank-1 { order: 2; padding: 45px 20px; border-top: 5px solid #d4af37; transform: scale(1.05); z-index: 2; }
.rank-1 .rank-badge { background: var(--gold-grad); }
.rank-1 .rank-name { font-size: 22px; }
.rank-1 .rank-score { font-size: 38px; }

.rank-2 { order: 1; border-top: 5px solid #a8a8a8; }
.rank-2 .rank-badge { background: var(--silver-grad); }

.rank-3 { order: 3; border-top: 5px solid #cd7f32; }
.rank-3 .rank-badge { background: var(--bronze-grad); }

.rank-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.rank-class { font-size: 12px; color: var(--sub); margin-bottom: 10px; font-weight: 500; }
.rank-score { font-size: 32px; font-weight: 800; color: var(--point); font-family: 'Cormorant Garamond', serif; line-height: 1; }
.rank-score span { font-size: 14px; font-weight: 400; margin-left: 2px; font-family: 'Noto Sans KR'; }

/* TABLE: 웹 리스트 간격 최적화 */
.table-card { background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 15px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
table { width: 100%; border-collapse: collapse; }
th { padding: 20px 10px; font-size: 12px; color: var(--sub); border-bottom: 2px solid var(--line); text-align: center; letter-spacing: 0.1em; }
td { padding: 18px 10px; text-align: center; border-bottom: 1px solid #f5f9f4; font-size: 15px; }

.row-rank { font-weight: 700; color: #a1ab9e; font-family: 'Cormorant Garamond', serif; font-size: 18px; }
.row-name { font-weight: 700; font-size: 16px; color: var(--main); }
.row-class { font-weight: 500; color: var(--sub); font-size: 14px; }
.row-score { font-weight: 700; color: var(--point); font-size: 18px; }

.footer { text-align: center; margin-top: 60px; color: var(--sub); font-size: 11px; letter-spacing: 0.1em; opacity: 0.8; }

/* MOBILE RESPONSIVE: 모바일에서도 '반' 정보 유지 */
@media(max-width:768px){
  body { padding: 20px 15px 60px; }
  .logo { font-size: 40px; }
  .top-ranking { flex-direction: column; align-items: center; gap: 12px; margin-bottom: 30px; }
  .rank-card { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; text-align: left; transform: none !important; }
  
  .rank-1, .rank-2, .rank-3 { order: unset; border-top: none; border-left: 5px solid; }
  .rank-1 { border-left-color: #d4af37; }
  .rank-2 { border-left-color: #a8a8a8; }
  .rank-3 { border-left-color: #cd7f32; }
  
  .rank-badge { margin: 0 15px 0 0; width: 34px; height: 34px; font-size: 16px; flex-shrink: 0; }
  .rank-info { flex-grow: 1; display: flex; flex-direction: column; }
  .rank-name { font-size: 16px; margin-bottom: 2px; }
  .rank-class { margin-bottom: 0; font-size: 11px; } 
  .rank-score { font-size: 26px; text-align: right; min-width: 75px; }

  /* 테이블 내 '반' 열 유지 및 너비 조정 */
  .table-card { padding: 10px 15px; }
  td { padding: 15px 5px; font-size: 13px; }
  th:nth-child(1), td:nth-child(1) { width: 45px; } /* RANK */
  th:nth-child(3), td:nth-child(3) { width: 60px; } /* CLASS */
  th:nth-child(4), td:nth-child(4) { width: 70px; } /* TOTAL */
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">S+ Writing<br><span>Ranking</span></div>
    <div class="sub">Daechi S+ Academy · Premium Logic Mastery</div>
  </div>

  <div id="topSection" class="top-ranking">
    </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>RANK</th>
          <th>NAME</th>
          <th>CLASS</th>
          <th>TOTAL</th>
        </tr>
      </thead>
      <tbody id="tbody">
        </tbody>
    </table>
  </div>

  <div class="footer">
    © MATHY YURI · THE HIGHEST LEVEL OF MATHEMATICAL WRITING
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzlCHDzIVbeZld0A2E10eoQGzYZjzBjIYTDLJZlo2DOMZAPvXOvMdHYqYbXvKYf5qNuwA/exec';

fetch(SHEET_URL)
.then(res => res.json())
.then(data => {
  const studentMap = {};

  data.forEach(row => {
    const rawName = String(row["이름"] || "").trim();
    const rawClass = String(row["반"] || "").trim().toUpperCase();
    const score = Number(row["점수"] || 0);

    if(!rawName) return;

    if(rawClass.includes("S")) {
      if(!studentMap[rawName]) {
        studentMap[rawName] = { name: rawName, class: rawClass, totalScore: 0 };
      }
      studentMap[rawName].totalScore += score;
    }
  });

  const rankingArray = Object.values(studentMap).sort((a, b) => b.totalScore - a.totalScore);

  // TOP 3 렌더링
  const topSection = document.getElementById('topSection');
  topSection.innerHTML = rankingArray.slice(0, 3).map((student, idx) => `
    <div class="rank-card rank-${idx + 1}">
      <div class="rank-badge">${idx + 1}</div>
      <div class="rank-info">
        <div class="rank-name">${student.name}</div>
        <div class="rank-class">${student.class}</div>
      </div>
      <div class="rank-score">${student.totalScore}<span>pts</span></div>
    </div>
  `).join('');

  // 전체 리스트 렌더링
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rankingArray.map((student, idx) => `
    <tr>
      <td class="row-rank">${idx + 1}</td>
      <td class="row-name">${student.name}</td>
      <td class="row-class">${student.class}</td>
      <td class="row-score">${student.totalScore}</td>
    </tr>
  `).join('');

})
.catch(err => {
  console.error(err);
  document.getElementById('tbody').innerHTML = '<tr><td colspan="4" style="padding:40px; color:red;">데이터를 불러오는 중입니다...</td></tr>';
});
</script>

</body>
</html>
