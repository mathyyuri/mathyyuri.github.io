<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>S+ Writing Ranking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#edf5ea; --card:#fcfefc; --line:#d9e7d5;
  --main:#233222; --sub:#6f7d6c; --point:#7da27b;
  --gold-grad: linear-gradient(135deg, #d4af37 0%, #f7ef8a 50%, #d4af37 100%);
  --silver-grad: linear-gradient(135deg, #a8a8a8 0%, #e0e0e0 50%, #a8a8a8 100%);
  --bronze-grad: linear-gradient(135deg, #a0522d 0%, #cd7f32 50%, #a0522d 100%);
  
  /* 반별 박스 색상 정의 */
  --s-plus-bg: #f8eeee;
  --s-plus-text: #a67d7d;
  --s-bg: #edf2ee;
  --s-text: #7d9681;

  /* 외부생 전용 스타일 */
  --ext-bg: #f3effa;
  --ext-text: #8a7ba2;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--bg); font-family:'Noto Sans KR', sans-serif; color:var(--main); padding:42px 20px 80px; }
.container{ max-width:1100px; margin:auto; }

/* HEADER */
.header{ text-align:center; margin-bottom:40px; }
.logo{ font-family:'Cormorant Garamond', serif; font-size:64px; line-height:1; font-weight:600; margin-bottom:12px; letter-spacing:-1px; }
.logo span{ color:var(--point); font-style:italic; }
.sub{ color:var(--sub); font-size:13px; letter-spacing:0.25em; font-weight:500; text-transform:uppercase; }

/* TABS */
.rank-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
.tab-btn { 
  background: rgba(111, 125, 108, 0.1); border: 1px solid var(--line); padding: 10px 24px; 
  border-radius: 30px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--sub); 
  transition: all 0.3s; font-family: 'Noto Sans KR';
}
.tab-btn.active { background: var(--main); color: #fff; border-color: var(--main); }

/* PREMIUM TOP 3 SECTION */
.top-ranking { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-bottom: 50px; padding: 20px; }
.rank-card { 
  background: var(--card); border: 1px solid var(--line); border-radius: 20px; 
  padding: 30px 20px; text-align: center; box-shadow: 0 15px 35px rgba(40,60,40,0.08); 
  position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
}
.rank-card:hover { transform: translateY(-10px); box-shadow: 0 20px 45px rgba(40,60,40,0.12); }

.rank-badge {
  width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 15px; font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 20px; color: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.rank-1 { order: 2; width: 34%; padding: 50px 20px; border-top: 5px solid #d4af37; }
.rank-1 .rank-badge { background: var(--gold-grad); transform: scale(1.2); }
.rank-1 .rank-name { font-size: 24px; }
.rank-2 { order: 1; width: 30%; border-top: 5px solid #a8a8a8; }
.rank-2 .rank-badge { background: var(--silver-grad); }
.rank-3 { order: 3; width: 30%; border-top: 5px solid #cd7f32; }
.rank-3 .rank-badge { background: var(--bronze-grad); }

.rank-name { font-size: 19px; font-weight: 700; margin-bottom: 6px; }

/* 카드 내 반 정보 박스 스타일 */
.rank-class { 
  font-size: 11px; 
  margin-bottom: 12px; 
  font-weight: 700;
  display: inline-block;
  padding: 2px 10px;
  border-radius: 6px;
}

.rank-score { font-size: 32px; font-weight: 800; color: var(--point); font-family: 'Cormorant Garamond', serif; }
.rank-score span { font-size: 14px; font-weight: 400; margin-left: 2px; font-family: 'Noto Sans KR'; }

/* TABLE */
.table-card { background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { padding: 18px; font-size: 12px; color: var(--sub); border-bottom: 2px solid var(--line); text-align: center; letter-spacing: 0.1em; }
td { padding: 18px; text-align: center; border-bottom: 1px solid #f2f7f1; font-size: 15px; }
.row-rank { font-weight: 700; color: #a1ab9e; font-family: 'Cormorant Garamond', serif; font-size: 18px; }
.row-name { font-weight: 700; font-size: 16px; color: var(--main); white-space: nowrap; }

/* 테이블 내 반 정보 박스 스타일 */
.row-class-box {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
}

/* 반별 색상 조건 적용을 위한 클래스 */
.tag-s-plus { background-color: var(--s-plus-bg); color: var(--s-plus-text); }
.tag-s { background-color: var(--s-bg); color: var(--s-text); }
.tag-ext { background-color: var(--ext-bg); color: var(--ext-text); }

.row-score { font-weight: 700; color: var(--point); font-size: 18px; }

.footer { text-align: center; margin-top: 60px; color: var(--sub); font-size: 12px; letter-spacing: 0.1em; }

/* 모바일 최적화 */
@media(max-width:768px){
  .top-ranking { display: flex !important; flex-direction: row !important; align-items: flex-end !important; gap: 8px !important; padding: 10px 0 !important; }
  .rank-card { padding: 20px 10px !important; flex: 1 !important; }
  .rank-1 { order: 2 !important; min-height: 200px; } 
  .rank-2 { order: 1 !important; min-height: 165px; } 
  .rank-3 { order: 3 !important; min-height: 150px; }
  .rank-name { font-size: 15px !important; }
  .rank-score { font-size: 20px !important; }
  .rank-badge { width: 35px !important; height: 35px !important; font-size: 16px !important; }
  
  td, th { padding: 12px 5px !important; font-size: 13px !important; }
  .row-name { font-size: 14px !important; display: inline-block; max-width: 80px; overflow: hidden; text-overflow: ellipsis; vertical-align: middle; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">S+ Writing<br><span>Ranking</span></div>
    <div class="sub">Daechi S+ Academy · Premium Logic Mastery</div>
  </div>

  <div class="rank-tabs">
    <button class="tab-btn active" data-filter="ACADEMY">대치 S+학원</button>
    <button class="tab-btn" data-filter="S+">S+ Class</button>
    <button class="tab-btn" data-filter="S">S Class</button>
    <button class="tab-btn" data-filter="TOTAL">TOTAL</button>
  </div>

  <div id="topSection" class="top-ranking"></div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>RANK</th>
          <th>NAME</th>
          <th>CLASS</th>
          <th>SCORE</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="footer">
    © MATHY YURI · THE HIGHEST LEVEL OF MATHEMATICAL WRITING
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzlCHDzIVbeZld0A2E10eoQGzYZjzBjIYTDLJZlo2DOMZAPvXOvMdHYqYbXvKYf5qNuwA/exec';

let allRankingData = [];
let currentFilter = 'ACADEMY'; // 기본 탭을 '대치 S+학원'으로 설정

function getClassTag(className) {
  if (className.includes('+')) return 'tag-s-plus';
  if (className.includes('S')) return 'tag-s';
  return 'tag-ext'; 
}

async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    const data = await res.json();
    const studentMap = {};

    data.forEach(row => {
      const rawName = String(row["이름"] || "").trim();
      const rawClass = String(row["반"] || "").trim().toUpperCase(); 
      const score = Number(row["점수"] || 0);
      if(!rawName) return;

      if(!studentMap[rawName]) {
        studentMap[rawName] = { name: rawName, class: rawClass, totalScore: 0 };
      }
      studentMap[rawName].totalScore += score;
    });

    allRankingData = Object.values(studentMap).sort((a, b) => b.totalScore - a.totalScore);
    renderRanking();
  } catch (err) {
    console.error(err);
    document.getElementById('tbody').innerHTML = '<tr><td colspan="4" style="padding:40px; color:red;">데이터 로드 실패</td></tr>';
  }
}

function renderRanking() {
  // 💡 필터 조건문 재배치 및 분기 최적화 완료
  const filtered = allRankingData.filter(s => {
    if (currentFilter === 'TOTAL') {
      return true; // 100% 전체 데이터 출력
    }
    if (currentFilter === 'ACADEMY') {
      // S+, S, A, B Class 정규반만 포함 (외부생 필터링)
      return s.class.includes('S') || s.class.includes('A') || s.class.includes('B');
    }
    if (currentFilter === 'S+') {
      return s.class.includes('+');
    }
    if (currentFilter === 'S') {
      return s.class.includes('S') && !s.class.includes('+');
    }
    return false;
  });

  const topSection = document.getElementById('topSection');
  const top3 = filtered.slice(0, 3);
  
  topSection.innerHTML = top3.map((student, idx) => {
    const tagCls = getClassTag(student.class);
    return `
      <div class="rank-card rank-${idx + 1}">
        <div class="rank-badge">${idx + 1}</div>
        <div class="rank-name">${student.name}</div>
        <div class="rank-class ${tagCls}">${student.class}</div>
        <div class="rank-score">${student.totalScore}<span>pts</span></div>
      </div>
    `;
  }).join('');

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map((student, idx) => {
    const tagCls = getClassTag(student.class);
    return `
      <tr>
        <td class="row-rank">${idx + 1}</td>
        <td class="row-name">${student.name}</td>
        <td><span class="row-class-box ${tagCls}">${student.class}</span></td>
        <td class="row-score">${student.totalScore}</td>
      </tr>
    `;
  }).join('');
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderRanking();
  });
});

loadData();
</script>

</body>
</html>
