<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일일일모 600제 RANKING | MATH STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7;
            --dark: #3a3530;
            --gold: #c8a84b;
            --shadow: 0 10px 30px rgba(58,53,48,0.07);
            --s-plus-bg: #f8eeee;
            --s-plus-text: #a67d7d;
            --s-bg: #edf2ee;
            --s-text: #7d9681;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', 'Noto Serif KR', serif; background: var(--bg); color: var(--dark); margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 30px 15px 80px; }

        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-size: clamp(1.4rem, 5vw, 2.5rem); letter-spacing: 4px; font-weight: 700; margin: 0 0 5px; }
        header p  { font-size: 0.75rem; opacity: 0.4; letter-spacing: 2px; margin: 0; }

        /* 명예의 전당 섹션 */
        .honor-section { text-align: center; margin-bottom: 60px; }
        .honor-section h2 { font-family: 'Noto Serif KR'; font-size: 1.1rem; letter-spacing: 5px; color: var(--gold); margin-bottom: 40px; font-weight: 700; }
        
        .honor-podium { 
            display: flex; 
            flex-wrap: nowrap; /* 모바일 가로 나열 유지 */
            justify-content: center; 
            align-items: stretch; 
            gap: 10px; 
        }
        
        .podium-card { 
            flex: 1;
            min-width: 0; /* 가로 나열을 위해 최소폭 해제 */
            max-width: 320px;
            border-radius: 25px; 
            text-align: center; 
            padding: 35px 15px; 
            background: white; 
            border: 1px solid #f0ede8; 
            position: relative;
            box-shadow: var(--shadow); 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 모바일 환경 최적화 */
        @media (max-width: 600px) {
            .container { padding: 20px 10px 60px; }
            .honor-podium { gap: 6px; }
            .podium-card { padding: 15px 5px; border-radius: 15px; }
            .p-label { font-size: 0.75rem !important; margin-bottom: 5px !important; letter-spacing: -0.5px !important; }
            .medal-icon { font-size: 1.6rem !important; margin-bottom: 5px !important; }
            .p-name { font-size: 0.85rem !important; }
            .p-class-tag { font-size: 0.55rem !important; padding: 1px 4px !important; margin-left: 2px !important; }
            .p-sub { font-size: 0.6rem !important; margin-bottom: 6px !important; letter-spacing: 0 !important; }
            .p-info { font-size: 0.75rem !important; padding: 4px 10px !important; }

            /* 티어 섹션 5개씩 2열 배치 및 명단 표시 */
            .tier-bar { 
                display: grid !important; 
                grid-template-columns: repeat(5, 1fr) !important;
                gap: 5px !important; 
                overflow-x: hidden !important; 
                padding: 0 !important;
            }
            .tier-group { min-width: 0 !important; gap: 5px !important; }
            .tier-badge { padding: 8px 2px !important; border-radius: 10px !important; }
            .t-icon { font-size: 1.1rem !important; }
            .t-name { font-size: 0.45rem !important; transform: scale(0.9); }
            .t-score { font-size: 0.5rem !important; }
            
            /* 모바일 명단 가독성 확보 */
            .t-member-list { 
                display: flex !important; 
                flex-direction: column !important;
                gap: 2px !important;
                margin-top: 4px !important;
                grid-template-columns: none !important;
            }
            .t-member-item { 
                font-size: 0.5rem !important; 
                padding: 2px 1px !important; 
                border-radius: 4px !important; 
                line-height: 1.1 !important;
            }
        }

        .podium-card:hover { transform: translateY(-8px); box-shadow: 0 15px 40px rgba(0,0,0,0.1); }

        .p-label { 
            font-family: 'Noto Serif KR', serif;
            font-size: 1.8rem; 
            font-weight: 900; 
            letter-spacing: -1px; 
            margin-bottom: 15px; 
            display: block;
            line-height: 1.2;
        }
        
        .top-tier .p-label { color: #7e57c2; }
        .top-total .p-label { color: #d4af37; }
        .top-today .p-label { color: #ff7043; }

        .medal-icon { font-size: 2.8rem; display: block; margin-bottom: 15px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }
        
        .p-name-wrap { margin-bottom: 10px; }
        .p-name { font-size: 1.2rem; font-weight: 700; font-family: 'Noto Serif KR'; color: #222; }
        .p-class-tag { 
            font-size: 0.7rem; 
            padding: 2px 8px; 
            border-radius: 8px; 
            margin-left: 5px; 
            vertical-align: middle;
            font-weight: 700;
        }

        .p-sub { font-size: 0.85rem; font-weight: 600; opacity: 0.5; margin-bottom: 12px; letter-spacing: 1px; }
        
        .p-info { 
            display: inline-block; padding: 6px 20px; border-radius: 20px;
            font-size: 1rem; font-weight: 700; color: white; background: var(--dark);
        }
        .top-tier .p-info { background: linear-gradient(135deg, #9575cd, #7e57c2); }
        .top-total .p-info { background: linear-gradient(135deg, #ffdc73, #d4af37); }
        .top-today .p-info { background: linear-gradient(135deg, #ffab91, #ff7043); }

        /* 티어 섹션 */
        .tier-section { margin-bottom: 50px; text-align: center; }
        .tier-section h2 { font-family: 'Noto Serif KR'; font-size: 1rem; letter-spacing: 3px; opacity: 0.5; margin-bottom: 25px; }
        .tier-bar { display: flex; justify-content: center; gap: 8px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .tier-bar::-webkit-scrollbar { display: none; }
        .tier-group { display: flex; flex-direction: column; align-items: center; min-width: 90px; gap: 10px; }
        .tier-badge { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 10px 5px; border-radius: 14px; border: 1.5px solid transparent; }
        .t-icon { font-size: 1.5rem; }
        .t-name { font-size: 0.55rem; font-weight: 700; letter-spacing: 1px; }
        .t-score { font-size: 0.65rem; font-weight: 700; opacity: 0.6; }
        .t-member-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; width: 100%; }
        .t-member-item { font-size: 0.6rem; padding: 4px 2px; border-radius: 6px; text-align: center; font-family: 'Noto Serif KR'; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid rgba(0,0,0,0.03); }
        .chip-s-plus { background: var(--s-plus-bg); color: var(--s-plus-text); }
        .chip-s      { background: var(--s-bg); color: var(--s-text); }
        .chip-default { background: rgba(255,255,255,0.5); color: #666; }

        .bg-unranked { background: #f0ede6; color: #6a6050; }
        .bg-iron     { background: #e8e0d8; color: #504030; }
        .bg-bronze   { background: #f5ede2; color: #7a4f2a; }
        .bg-silver   { background: #efefef; color: #3a5060; }
        .bg-gold     { background: #fdf3d7; color: #7a6010; }
        .bg-platinum { background: #e6f4f4; color: #1a6060; }
        .bg-emerald  { background: #e2f5e8; color: #1a5030; }
        .bg-diamond  { background: #e8e4f8; color: #3a2f80; }
        .bg-master   { background: #f8e8f2; color: #7a2060; }
        .bg-king     { background: linear-gradient(135deg,#fff8e0,#ffe0f0,#e0e8ff); color: #4020a0; }

        /* 랭킹 탭 & 리스트 */
        .rank-tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { background: #eee; border: none; padding: 9px 22px; border-radius: 20px; font-family: 'Poppins'; font-size: 0.82rem; font-weight: 600; cursor: pointer; color: #888; transition: all 0.25s; }
        .tab-btn.active { background: var(--dark); color: #fff; }
        .score-type-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; padding: 5px; background: #f0ede8; border-radius: 30px; width: fit-content; margin: 0 auto 30px; }
        .score-btn { background: transparent; border: none; padding: 8px 20px; border-radius: 25px; font-size: 0.85rem; font-weight: 700; cursor: pointer; color: #aaa; transition: 0.3s; }
        .score-btn.active { background: white; color: var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .rank-box { background: white; border-radius: 24px; padding: 28px 22px; box-shadow: var(--shadow); max-width: 700px; margin: 0 auto; }
        .box-title { font-size: 1rem; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #f0ede8; text-align: center; }
        .rank-row { display: flex; align-items: center; gap: 10px; padding: 12px 6px; border-bottom: 1px solid #fbf9f6; }
        .rank-row:last-child { border-bottom: none; }
        .r-num { font-weight: 700; font-size: 0.9rem; min-width: 26px; color: var(--gold); }
        .r-num.top1 { color: #b8392b; font-size: 1rem; }
        .r-icon { font-size: 1.05rem; }
        .r-name { font-weight: 700; font-family: 'Noto Serif KR'; flex: 1; font-size: 0.95rem; }
        .r-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; margin-left: 6px; font-weight: 700; }
        .r-tag.tag-s-plus { background: var(--s-plus-bg); color: var(--s-plus-text); }
        .r-tag.tag-s      { background: var(--s-bg); color: var(--s-text); }
        .r-tag.tag-default { background: #f0ede8; color: #999; }
        .r-pts { font-weight: 700; font-size: 0.88rem; white-space: nowrap; }
        .r-pts small { font-weight: 400; opacity: 0.45; font-size: 0.7rem; margin-left: 2px; }
        .empty-msg { text-align: center; padding: 40px; color: #bbb; font-size: 0.9rem; }
        .refresh-btn { display: block; margin: 20px auto 0; background: none; border: 1px solid #ddd; border-radius: 20px; padding: 7px 20px; font-size: 0.78rem; color: #aaa; cursor: pointer; }
        footer { text-align: center; color: #ccc; font-size: 0.72rem; padding: 40px 0; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>일일일모 600제 RANKING</h1>
        <p> MATHY YURI | DAECHI ACADEMY</p>
    </header>

    <section class="honor-section">
        <h2>✦ 명에의 전당 ✦</h2>
        <div class="honor-podium" id="honorPodium"></div>
    </section>

    <section class="tier-section">
        <h2>TIER STATUS</h2>
        <div class="tier-bar" id="tierBar"></div>
    </section>

    <div class="rank-tabs">
        <button class="tab-btn active" data-filter="all">TOTAL</button>
        <button class="tab-btn" data-filter="S+">S+ CLASS</button>
        <button class="tab-btn" data-filter="S">S CLASS</button>
    </div>

    <div class="score-type-tabs">
        <button class="score-btn active" data-score="today">오늘의 점수</button>
        <button class="score-btn" data-score="total">누적 점수</button>
        <button class="score-btn" data-score="tier">티어 점수</button>
    </div>

    <div class="rank-box">
        <div class="box-title" id="listTitle">오늘의 점수 🏆</div>
        <div id="mainList"></div>
    </div>

    <button class="refresh-btn" onclick="fetchData()">↺ 새로고침</button>
    <footer>© 2026 MATH STUDIO. ALL RIGHTS RESERVED.</footer>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwq78m3piSD6ZF8SnUShDspqdxgG2nmRpCAAb2ed1nOUVvHV3aSPTS0npEN39re-OE9/exec";

const TIERS = [
    { key: 'king',      name: 'KING',      emoji: '👑', min: 90, bg: 'bg-king'      },
    { key: 'master',   name: 'MASTER',   emoji: '🏆', min: 80, bg: 'bg-master'   },
    { key: 'diamond',  name: 'DIAMOND',  emoji: '💎', min: 70, bg: 'bg-diamond'  },
    { key: 'emerald',  name: 'EMERALD',  emoji: '❇️',  min: 60, bg: 'bg-emerald'  },
    { key: 'platinum', name: 'PLATINUM', emoji: '🪙', min: 50, bg: 'bg-platinum' },
    { key: 'gold',      name: 'GOLD',      emoji: '🥇', min: 40, bg: 'bg-gold'      },
    { key: 'silver',   name: 'SILVER',   emoji: '🛡️', min: 30, bg: 'bg-silver'   },
    { key: 'bronze',   name: 'BRONZE',   emoji: '⚔️',  min: 20, bg: 'bg-bronze'   },
    { key: 'iron',      name: 'IRON',      emoji: '🔥', min: 10, bg: 'bg-iron'      },
    { key: 'unranked', name: 'UNRANKED', emoji: '🌱', min: 0,  bg: 'bg-unranked' },
];

let allData = [];
let currentFilter = 'all';
let currentScoreKey = 'today';

function getTier(tierPts) {
    for (const t of TIERS) if (tierPts >= t.min) return t;
    return TIERS[TIERS.length - 1];
}

async function fetchData() {
    try {
        const res = await fetch(`${GAS_URL}?action=ranking&t=${Date.now()}`);
        const json = await res.json();
        const rawList = json.success ? json.data : json;

        allData = rawList.map(item => ({
            name: String(item.name || ''),
            class: String(item.class || ''),
            today: Number(item.today || 0),
            total: Number(item.total || 0),
            tier: Number(item.tierScore || item.total || 0)
        }));
        renderAll();
    } catch (err) {
        console.error(err);
        document.getElementById('mainList').innerHTML = '<div class="empty-msg">데이터 로드 실패</div>';
    }
}

function renderAll() {
    const data = currentFilter === 'all' ? allData : allData.filter(d => d.class === currentFilter);
    renderHonor(data);
    renderTierBar(data);
    renderMainList(data);
}

function renderHonor(data) {
    if (!data.length) return;
    
    const topTier = [...data].sort((a,b) => b.tier - a.tier)[0];
    const topTotal = [...data].sort((a,b) => b.total - a.total)[0];
    const topToday = [...data].sort((a,b) => b.today - a.today)[0];

    const cardHtml = (item, label, scoreKey, cls, iconEmoji) => {
        if (!item) return `<div class="podium-card ${cls}"><div class="p-label">${label}</div><div class="p-name">—</div></div>`;
        const tier = getTier(item.tier);
        const displayIcon = cls === 'top-tier' ? tier.emoji : iconEmoji;
        
        let classTagColor = item.class === 'S+' ? 'var(--s-plus-bg)' : 'var(--s-bg)';
        let classTextColor = item.class === 'S+' ? 'var(--s-plus-text)' : 'var(--s-text)';

        return `<div class="podium-card ${cls}">
            <div class="p-label">${label}</div>
            <span class="medal-icon">${displayIcon}</span>
            <div class="p-name-wrap">
                <span class="p-name">${item.name}</span>
                <span class="p-class-tag" style="background:${classTagColor}; color:${classTextColor}">${item.class}</span>
            </div>
            <div class="p-sub">${tier.name} TIER</div>
            <div class="p-info">${item[scoreKey].toFixed(1)}점</div>
        </div>`;
    };

    document.getElementById('honorPodium').innerHTML = 
        cardHtml(topTier, '티어점수 1st', 'tier', 'top-tier', '') +
        cardHtml(topTotal, '누적점수 1st', 'total', 'top-total', '👑') +
        cardHtml(topToday, "오늘의 점수 1st", 'today', 'top-today', '✨');
}

function renderTierBar(data) {
    const tierGroups = {};
    TIERS.forEach(t => tierGroups[t.key] = []);
    data.forEach(d => {
        const t = getTier(d.tier);
        tierGroups[t.key].push(d);
    });

    document.getElementById('tierBar').innerHTML = TIERS.map(t => {
        const members = tierGroups[t.key];
        const memberListHtml = members.length > 0 
            ? members.map(m => {
                let chipClass = m.class === 'S+' ? 'chip-s-plus' : (m.class === 'S' ? 'chip-s' : 'chip-default');
                return `<div class="t-member-item ${chipClass}">${m.name}</div>`;
            }).join('')
            : '';

        return `
            <div class="tier-group">
                <div class="tier-badge ${t.bg}">
                    <span class="t-icon">${t.emoji}</span>
                    <span class="t-name">${t.name}</span>
                    <span class="t-score">${t.min}+</span> </div>
                <div class="t-member-list">${memberListHtml}</div>
            </div>
        `;
    }).join('');
}

function renderMainList(data) {
    const listEl = document.getElementById('mainList');
    const displayData = data
        .filter(d => d[currentScoreKey] > 0)
        .sort((a,b) => b[currentScoreKey] - a[currentScoreKey]);

    const titleMap = { 'today': '오늘의 점수 🏆', 'total': '누적 점수 💎', 'tier': '티어 점수 👑' };
    document.getElementById('listTitle').innerText = titleMap[currentScoreKey];

    if (!displayData.length) {
        listEl.innerHTML = '<div class="empty-msg">기록된 데이터가 없습니다.</div>';
        return;
    }

    listEl.innerHTML = displayData.map((d, i) => {
        const tier = getTier(d.tier);
        let tagClass = d.class === 'S+' ? 'tag-s-plus' : (d.class === 'S' ? 'tag-s' : 'tag-default');

        return `<div class="rank-row">
            <span class="r-num ${i < 3 ? 'top1' : ''}">${i + 1}</span>
            <span class="r-icon">${tier.emoji}</span>
            <span class="r-name">${d.name}<span class="r-tag ${tagClass}">${d.class}</span></span>
            <span class="r-pts">${d[currentScoreKey].toFixed(1)}<small>점</small></span>
        </div>`;
    }).join('');
}

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        renderAll();
    };
});

document.querySelectorAll('.score-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentScoreKey = this.dataset.score;
        renderMainList(currentFilter === 'all' ? allData : allData.filter(d => d.class === currentFilter));
    };
});

fetchData();
setInterval(fetchData, 180000);
</script>
</body>
</html>
