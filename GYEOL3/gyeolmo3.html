<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mathy Yuri | 결 모의고사 3회</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['\\[', '\\]']],
                processEscapes: true
            },
            options: { 
                enableMenu: false
            },
            chtml: {
                displayAlign: 'center',
                displayIndent: '0'
            }
        };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght=1,600&family=Montserrat:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-mint: #e0f2f1; --point-mint: #26a69a; --text-dark: #2c3e50; --white: #ffffff;
            --sub-mint-bg: #00796b; 
        }
        * { box-shadow: border-box; margin: 0; padding: 0; font-family: 'Montserrat', 'Nanum Myeongjo', sans-serif; box-sizing: border-box; }
        body { background-color: #f7fafc; color: var(--text-dark); padding: 20px 10px; line-height: 1.8; -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none; }
        .container { max-width: 750px; margin: 0 auto; background: var(--white); border-radius: 16px; padding: 25px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px dashed var(--bg-mint); padding-bottom: 20px; }
        .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-style: italic; color: var(--sub-mint-bg); letter-spacing: 1px; }
        .header p { font-size: 0.85rem; color: #7f8c8d; margin-top: 5px; font-weight: 700; }
        
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .prob-btn { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 0; cursor: pointer; transition: all 0.2s ease; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
        .prob-btn .num-lbl { font-size: 0.95rem; font-weight: 800; color: #64748b; }
        .prob-btn .ans-lbl { font-size: 0.75rem; font-weight: 700; color: #94a3b8; }
        
        .prob-btn:hover { background: var(--bg-mint); }
        .prob-btn:hover .num-lbl { color: var(--sub-mint-bg); }
        
        .prob-btn.active { background: var(--point-mint); border-color: var(--point-mint); box-shadow: 0 4px 12px rgba(38,166,154,0.3); }
        .prob-btn.active .num-lbl { color: var(--white); }
        .prob-btn.active .ans-lbl { color: var(--bg-mint); }
        
        .prob-btn.desc-type { background: #fff4e6; border-color: #ffd8a8; }
        .prob-btn.desc-type .num-lbl { color: #d9480f; }
        .prob-btn.desc-type .ans-lbl { color: #f76707; }
        .prob-btn.desc-type.active { background: #d9480f; border-color: #d9480f; box-shadow: 0 4px 12px rgba(217,72,15,0.3); }
        .prob-btn.desc-type.active .num-lbl, .prob-btn.desc-type.active .ans-lbl { color: var(--white); }

        .viewer-card { display: none; background: #fafafa; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-top: 15px; position: relative; }
        .viewer-card.active { display: block; animation: fadeIn 0.4s ease forwards; }
        
        .prob-label { display: inline-block; background: var(--sub-mint-bg); color: var(--white); font-size: 0.75rem; font-weight: 800; padding: 3px 8px; border-radius: 4px; margin-bottom: 12px; letter-spacing: 0.5px; }
        .viewer-card.desc-mode .prob-label { background: #d9480f; }
        .prob-text { font-size: 1.05rem; font-weight: 700; color: var(--text-dark); margin-bottom: 18px; word-break: keep-all; line-height: 1.8; }
        
        .prob-img-area { display: flex; justify-content: center; align-items: center; margin: 18px 0; background: var(--white); padding: 12px; border-radius: 8px; border: 1px dashed #cbd5e1; }
        .prob-img-area img { max-width: 100%; height: auto; max-height: 220px; object-fit: contain; }

        /* 기본 선지 스타일 (가로 한 줄 배치) */
        .options-row { display: flex; flex-direction: row; flex-wrap: nowrap; justify-content: space-between; gap: 6px; margin-bottom: 22px; width: 100%; }
        .option-item { flex: 1; background: var(--white); border: 1px solid #e2e8f0; padding: 10px 4px; border-radius: 6px; font-size: 0.9rem; font-weight: 700; text-align: center; white-space: nowrap; }
        
        /* 12번 전용: 3개 배치 후 행바꿈 + 가운데 정렬 스타일 */
        .options-row.grid-3-2 { 
            flex-wrap: wrap !important; 
            justify-content: center !important; 
            gap: 12px; 
        }
        .options-row.grid-3-2 .option-item { 
            flex: 0 0 calc(33.333% - 12px) !important; 
            min-width: 210px; 
        }

        .sol-area { border-top: 1px solid #e2e8f0; padding-top: 18px; margin-top: 18px; }
        .sol-title { font-size: 0.85rem; font-weight: 800; color: var(--point-mint); letter-spacing: 0.5px; margin-bottom: 8px; }
        .viewer-card.desc-mode .sol-title { color: #d9480f; }
        .ans-highlight { display: inline-block; font-weight: 800; color: #e74c3c; margin-bottom: 10px; font-size: 1.05rem; }
        
        .sol-text { font-size: 0.98rem; color: #475569; word-break: keep-all; word-wrap: break-word; white-space: normal; line-height: 1.9; }

        mjx-container { 
            font-size: 112% !important; 
            margin: 4px 0 !important; 
            max-width: 100% !important; 
            vertical-align: -0.12em !important; 
            color: #1a252f;
        }
        mjx-frac { font-size: 100% !important; padding: 0 3px !important; }
        mjx-num, mjx-den { font-size: 95% !important; }

        .desc-notice { background: #fff5f5; border: 1px dashed #feb2b2; padding: 15px; border-radius: 8px; color: #c53030; font-size: 0.9rem; font-weight: 700; text-align: center; margin-top: 15px; line-height: 1.6; }
        .btn-link { display: inline-block; width: 100%; text-align: center; background: #d9480f; color: var(--white); border: none; padding: 12px 0; border-radius: 8px; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 10px rgba(217,72,15,0.2); }

        @media (max-width: 600px) {
            body { padding: 15px 6px; }
            .container { padding: 18px 12px; }
            
            .options-row { flex-direction: row !important; flex-wrap: nowrap !important; gap: 4px; }
            .option-item { font-size: 0.73rem; padding: 8px 2px; text-align: center; }
            
            /* 모바일 화면에서는 12번 전용 레이아웃도 보기 편하게 세로 정렬로 전환 */
            .options-row.grid-3-2 { flex-direction: column !important; flex-wrap: wrap !important; gap: 8px; }
            .options-row.grid-3-2 .option-item { font-size: 0.88rem; padding: 10px 12px; text-align: left; flex: 1 1 100% !important; white-space: normal; }

            mjx-container[display="true"] { 
                display: block !important; 
                text-align: left !important; 
                padding-left: 8px; 
                overflow-x: auto !important; 
                overflow-y: hidden !important;
            }
            .sol-text { font-size: 0.93rem; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<script>
    const quizData = {
        1: {
            ans: "⑤",
            text: "주머니 속에 서로 다른 흰 공 \\(3\\)개, 서로 다른 빨간 공 \\(2\\)개, 서로 다른 파란 공이 \\(4\\)개 들어 있다. 이 주머니에서 동시에 \\(4\\)개의 공을 꺼낼 때, 꺼낸 공의 색이 \\(3\\)종류인 경우의 수를 구하시오.",
            options: ["① \\(48\\)", "② \\(54\\)", "③ \\(60\\)", "④ \\(66\\)", "⑤ \\(72\\)"],
            sol: "총 \\(4\\)개의 공을 꺼낼 때 색이 \\(3\\)종류이려면, 어느 한 색상에서 \\(2\\)개를 뽑고 나머지 두 색상에서 각각 \\(1\\)개씩 뽑아야 합니다.<br><br><b>1) 흰 공 \\(2\\)개, 빨간 공 \\(1\\)개, 파란 공 \\(1\\)개인 경우:</b><br>\\(_3C_2 \\times _2C_1 \\times _4C_1 = 3 \\times 2 \\times 4 = 24\\)<br><br><b>2) 흰 공 \\(1\\)개, 빨간 공 \\(2\\)개, 파란 공 \\(1\\)개인 경우:</b><br>\\(_3C_1 \\times _2C_2 \\times _4C_1 = 3 \\times 1 \\times 4 = 12\\)<br><br><b>3) 흰 공 \\(1\\)개, 빨간 공 \\(1\\)개, 파란 공 \\(2\\)개인 경우:</b><br>\\(_3C_1 \\times _2C_1 \\times _4C_2 = 3 \\times 2 \\times 6 = 36\\)<br><br>따라서 구하고자 하는 총 경우의 수는 합의 법칙에 의해 \\(24 + 12 + 36 = 72\\)입니다."
        },
        2: {
            ans: "①",
            text: "행렬 \\(A = \\begin{pmatrix} 1 & x & 2 \\\\ -3 & 6 & y \\end{pmatrix}\\)의 \\((i, j)\\) 성분 \\(a_{ij}\\)가 모든 열 인덱스 \\(j\\)에 대하여 \\(a_{2j} = -3a_{1j}\\)를 만족할 때, \\(x + y\\)의 값은?",
            options: ["① \\(-8\\)", "② \\(-4\\)", "③ \\(0\\)", "④ \\(4\\)", "⑤ \\(8\\)"],
            sol: "주어진 성분 정의 공식 \\(a_{2j} = -3a_{1j}\\)에 행렬 각 열의 성분을 대입합니다.<br><br>1) \\(j=1\\) 일 때 (\\(1\\)열): \\(a_{21} = -3a_{11} \\implies -3 = -3 \\times 1\\) (성립)<br>2) \\(j=2\\) 일 때 (\\(2\\)열): \\(a_{22} = -3a_{12} \\implies 6 = -3x \\implies x = -2\\)<br>3) \\(j=3\\) 일 때 (\\(3\\)열): \\(a_{23} = -3a_{13} \\implies y = -3 \\times 2 \\implies y = -6\\)<br><br>따라서 구하고자 하는 값은 \\(x + y = -2 + (-6) = -8\\)입니다."
        },
        3: {
            ans: "⑤",
            text: "어른 \\(2\\)명을 포함한 \\(7\\)명의 사람 중에서 어른 \\(2\\)명을 반드시 포함하여 총 \\(5\\)명을 뽑아 일렬로 세우는 모든 방법의 수를 구하시오.",
            options: ["① \\(480\\)", "② \\(900\\)", "③ \\(1020\\)", "④ \\(1150\\)", "⑤ \\(1200\\)"],
            sol: "어른 \\(2\\)명은 이미 선발이 고정되어 있으므로, 남은 \\(5\\)명의 일반 지원자 풀 중에서 추가 배치할 \\(3\\)명을 더 선택해야 합니다.<br><br><b>1단계 (인원 선별 조합):</b><br>\\[_5C_3 = _5C_2 = \\dfrac{5 \\times 4}{2 \\times 1} = 10\\]<b>2단계 (선발이 완료된 총 \\(5\\)명을 일렬 순열 배열):</b><br>\\[5! = 120\\]<b>최종 연산 (곱의 법칙):</b><br>\\[10 \\times 120 = 1200\\]"
        },
        4: {
            ans: "②",
            text: "두 실수 \\(x, y\\)에 대하여 두 행렬 \\(A = \\begin{pmatrix} -2 & x \\\\ 1 & 0 \\end{pmatrix}, B = \\begin{pmatrix} -1 & 4 \\\\ y & -3 \\end{pmatrix}\\)가 식 \\((A+B)(A-B) = A^2 - B^2\\)을 만족할 때, \\(x^2 + y^2\\)의 값은?",
            options: ["① \\(13\\)", "② \\(17\\)", "③ \\(25\\)", "④ \\(27\\)", "⑤ \\(32\\)"],
            sol: "행렬의 전개식 공식에 의해 \\((A+B)(A-B) = A^2 - AB + BA - B^2\\)이므로, 문제의 조건이 성립하려면 \\(AB = BA\\)가 성립해야 합니다.<br><br>두 행렬 곱셈을 연산하면 다음과 같습니다.<br>\\[AB = \\begin{pmatrix} -2 & x \\\\ 1 & 0 \\end{pmatrix} \\begin{pmatrix} -1 & 4 \\\\ y & -3 \\end{pmatrix} = \\begin{pmatrix} 2+xy & -8-3x \\\\ -1 & 4 \\end{pmatrix}\\]<br>\\[BA = \\begin{pmatrix} -1 & 4 \\\\ y & -3 \\end{pmatrix} \\begin{pmatrix} -2 & x \\\\ 1 & 0 \\end{pmatrix} = \\begin{pmatrix} 6 & -x \\\\ -2y-3 & xy \\end{pmatrix}\\]각 대응 성분이 완벽히 매칭되어야 하므로 방정식을 연립합니다.<br>1) \\(1\\)행 \\(2\\)열 비교: \\(-8 - 3x = -x \\implies 2x = -8 \\implies x = -4\\)<br>2) \\(1\\)행 \\(1\\)열 비교: \\(2 + xy = 6 \\implies xy = 4\\)<br>\\(x = -4\\)이므로 \\(-4y = 4 \\implies y = -1\\)<br><br>최종 연산 결과: \\(x^2 + y^2 = 16 + 1 = 17\\)이므로 정답은 ②번입니다."
        },
        5: {
            ans: "③",
            text: "부등식 \\(|2x - 7| > |x - 3|\\)의 해가 \\(x < a\\) 또는 \\(x > b\\) 일 때, 두 실수 \\(a, b\\)에 대하여 \\(3a - b\\)의 값은?",
            options: ["① \\(2\\)", "② \\(4\\)", "③ \\(6\\)", "④ \\(8\\)", "⑤ \\(10\\)"],
            sol: "양변이 모두 절댓값이므로 양변을 제곱하여 절댓값을 제거하는 방법을 사용합니다.<br>\\[(2x - 7)^2 > (x - 3)^2\\]\\[4x^2 - 28x + 49 > x^2 - 6x + 9\\]\\[3x^2 - 22x + 40 > 0\\]좌변을 인수분해하면 \\((3x - 10)(x - 4) > 0\\) 이므로 부등식의 최종 해는 다음과 같습니다.<br>\\[x < \\dfrac{10}{3} \\text{ 또는 } x > 4\\]따라서 \\(a = \\dfrac{10}{3}, b = 4\\)가 되므로<br>구하고자 하는 값: \\(3a - b = 3 \\times \\dfrac{10}{3} - 4 = 10 - 4 = 6\\)"
        },
        6: {
            ans: "②",
            text: "연립부등식 \\(\\begin{cases} \\dfrac{x+3}{4} - \\dfrac{1-x}{2} < 2 \\\\ 0.4x + 1.3 < 0.5x + 1.7 \\end{cases}\\)의 해를 올바르게 구한 것은?",
            options: ["① \\(-6 < x < \\dfrac{3}{2}\\)", "② \\(-4 < x < \\dfrac{7}{3}\\)", "③ \\(-\\dfrac{4}{3} < x < 3\\)", "④ \\(2 < x < \\dfrac{11}{4}\\)", "⑤ \\(-\\dfrac{1}{3} < x < 5\\)"],
            sol: "각각의 일차부등식을 분리하여 풀이합니다.<br><br><b>1) 첫 번째 식:</b> 양변에 \\(4\\)를 곱하여 분모를 정리합니다.<br>\\(x + 3 - 2(1 - x) < 8 \\implies x + 3 - 2 + 2x < 8\\)<br>\\(3x + 1 < 8 \\implies 3x < 7 \\implies x < \\dfrac{7}{3}\\)<br><br><b>2) 두 번째 식:</b> 양변에 계수를 정수화하기 위해 \\(10\\)을 곱합니다.<br>\\(4x + 13 < 5x + 17 \\implies -x < 4 \\implies x > -4\\)<br><br>두 일차부등식의 공통 범위를 구하면 \\(-4 < x < \\dfrac{7}{3}\\)가 되어 정답은 ②번입니다."
        },
        7: {
            ans: "③",
            text: "두 주사위를 동시에 던져 나오는 눈의 수를 차례로 \\(a, b\\)라 할 때, 이차함수 \\(y = x^2 + 2ax + 9b\\)의 그래프가 \\(x\\)축과 적어도 한 점에서 만나도록 하는 순서쌍 \\((a, b)\\)의 개수는?",
            options: ["① \\(4\\)", "② \\(6\\)", "③ \\(8\\)", "④ \\(10\\)", "⑤ \\(12\\)"],
            sol: "이차함수 그래프가 \\(x\\)축과 적어도 한 점에서 만난다는 것은 판별식 \\(D \\ge 0\\)임을 의미합니다.<br>\\[\\dfrac{D}{4} = a^2 - 9b \\ge 0 \\implies b \\le \\dfrac{a^2}{9}\\]주사위 눈의 조건 (\\(1 \\le a, b \\le 6\\)인 자연수)을 만족하는 순서쌍의 개수를 각 \\(a\\)의 값에 따라 구합니다.<br><br>1) \\(a=1\\) 일 때: \\(b \\le \\dfrac{1}{9} \\implies 0\\)개<br>2) \\(a=2\\) 일 때: \\(b \\le \\dfrac{4}{9} \\implies 0\\)개<br>3) \\(a=3\\) 일 때: \\(b \\le 1 \\implies 1\\)개 \\((b=1)\\)<br>4) \\(a=4\\) 일 때: \\(b \\le \\dfrac{16}{9} \\approx 1.77 \\implies 1\\)개 \\((b=1)\\)<br>5) \\(a=5\\) 일 때: \\(b \\le \\dfrac{25}{9} \\approx 2.77 \\implies 2\\)개 \\((b=1, 2)\\)<br>6) \\(a=6\\) 일 때: \\(b \\le 4 \\implies 4\\)개 \\((b=1, 2, 3, 4)\\)<br><br>따라서 만족하는 순서쌍의 총개수는 \\(0 + 0 + 1 + 1 + 2 + 4 = 8\\)개이므로 정답은 ③번입니다."
        },
        8: {
            ans: "④",
            text: "행렬 방정식 \\(\\begin{pmatrix} x & y \\\\ 2 & 1 \\end{pmatrix} \\begin{pmatrix} 3 & x \\\\ -1 & y \\end{pmatrix} = \\begin{pmatrix} 6 & 15 \\\\ 4 & 2x \\end{pmatrix} + \\begin{pmatrix} 3 & 10 \\\\ 1 & y \\end{pmatrix}\\)을 만족시키는 두 실수 \\(x, y\\)에 대하여 \\(xy\\)의 최댓값을 구하시오.",
            options: ["① \\(30\\)", "② \\(24\\)", "③ \\(18\\)", "④ \\(12\\)", "⑤ \\(6\\)"],
            sol: "좌변의 곱셈 연산과 우변의 덧셈 연산을 각각 정리합니다.<br>좌변: \\[\\begin{pmatrix} 3x-y & x^2+y^2 \\\\ 6-1 & 2x+y \\end{pmatrix} = \\begin{pmatrix} 3x-y & x^2+y^2 \\\\ 5 & 2x+y \\end{pmatrix}\\]우변: \\[\\begin{pmatrix} 6+3 & 15+10 \\\\ 4+1 & 2x+y \\end{pmatrix} = \\begin{pmatrix} 9 & 25 \\\\ 5 & 2x+y \\end{pmatrix}\\]각 대응 성분을 계수 대조법으로 비교합니다.<br>1) \\(1\\)행 \\(1\\)열 연립: \\(3x - y = 9 \\implies y = 3x - 9\\)<br>2) \\(1\\)행 \\(2\\)열 연립: \\(x^2 + y^2 = 25\\)<br><br>\\(y\\) 식을 대입하여 이차방정식으로 유도합니다.<br>\\(x^2 + (3x - 9)^2 = 25 \\implies 10x^2 - 54x + 56 = 0\\)<br>약분하면 \\(5x^2 - 27x + 28 = 0\\) 이며 인수분해 시 \\((5x - 7)(x - 4) = 0\\)이 됩니다.<br><br>- Case 1: \\(x = 4\\) 일 때, \\(y = 3(4) - 9 = 3 \\implies xy = 12\\)<br>- Case 2: \\(x = \\dfrac{7}{5}\\) 일 때, \\(y = 3(\\dfrac{7}{5}) - 9 = -\\dfrac{24}{5} \\implies xy = -\\dfrac{168}{25}\\)<br><br>따라서 구하고자 하는 곱 \\(xy\\)의 최댓값은 \\(12\\)이므로 정답은 ④번입니다."
        },

                    imgHtml = `<div class="prob-img-area"><img src="${data.img}" alt="Problem Diagram"></div>`;
                }
                
                let optionsHtml = data.options.map(opt => `<div class="option-item">${opt}</div>`).join('');
                
                // 💡 오직 12번 문항일 때만 3개 배치 후 행바꿈(grid-3-2) 클래스가 들어가도록 지정했습니다.
                let isWrapMode = (num === 12) ? 'grid-3-2' : ''; 
                
                viewer.innerHTML = `
                    <span class="prob-label">SEQUENCE #${num.toString().padStart(2, '0')}</span>
                    <div class="prob-text">${data.text}</div>
                    ${imgHtml}
                    <div class="options-row ${isWrapMode}">${optionsHtml}</div>
                    <div class="sol-area">
                        <div class="sol-title">LOGIC ARCHIVE</div>
                        <span class="ans-highlight">[정답 : ${data.ans}]</span>
                        <div class="sol-text">${data.sol}</div>
                    </div>
                `;
            }
            viewer.classList.add('active');
            
            if(window.MathJax) {
                MathJax.typesetPromise([viewer]).catch(function (err) {
                    console.log(err.message);
                });
            }
        }, 50);
    }
</script>
</body>
</html>
