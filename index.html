<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MATHY YURI System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#edf5ea; --card:#f9fdf7; --line:#d9e7d5;
  --main:#233222; --sub:#6f7d6c; --point:#7da27b;
  --hover:#f2f8ef; --open-bg:#e5f0e1; --open:#6f9270;
  --soon-bg:#eef1eb; --soon:#a1ab9e;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--bg); color:var(--main); font-family:'Noto Sans KR', sans-serif; padding:42px 20px 80px; }
a{ text-decoration:none; color:inherit; }
.container{ max-width:1240px; margin:auto; }

/* HEADER */
.header{ display:flex; justify-content:space-between; align-items:center; gap:30px; margin-bottom:52px; }
.logo-wrap{ flex:1; }
.logo{ font-family:'Cormorant Garamond', serif; font-size:76px; line-height:0.93; font-weight:600; letter-spacing:-1px; }
.logo span{ color:var(--point); font-style:italic; }
.sub{ margin-top:18px; color:var(--sub); font-size:13px; letter-spacing:0.28em; }

/* PROFILE SECTION */
.profile-section { display: flex; align-items: center; gap: 24px; }
.profile { width: 120px; height: 120px; border-radius: 50%; overflow: hidden; border: 3px solid #ffffff; box-shadow: 0 10px 30px rgba(60,90,60,0.12); flex-shrink: 0; }
.profile img { width: 100%; height: 100%; object-fit: cover; }
.profile-links { display: flex; flex-direction: column; gap: 10px; }

.live-chart-btn {
  display: inline-flex; align-items: center; padding: 10px 18px; background: #ffffff;
  border: 1px solid var(--point); border-radius: 30px; color: var(--open);
  font-size: 13px; font-weight: 700; transition: all 0.3s ease;
  box-shadow: 0 4px 12px rgba(125, 162, 123, 0.1);
}
.live-chart-btn .dot { width: 7px; height: 7px; background-color: var(--point); border-radius: 50%; margin-right: 8px; animation: blink 1.5s infinite; }
@keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
.live-chart-btn:hover { background: var(--point); color: #fff; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(125, 162, 123, 0.25); }

/* LAYOUT */
.layout{ display:grid; grid-template-columns:1.9fr 1fr; gap:22px; }
.card{ background:var(--card); border:1px solid var(--line); border-radius:32px; padding:36px; box-shadow:0 10px 28px rgba(80,110,80,0.05); }
.category{ color:var(--point); font-size:12px; letter-spacing:0.18em; margin-bottom:18px; font-weight:700; }
.title{ font-family:'Cormorant Garamond', serif; font-size:42px; line-height:1.08; margin-bottom:14px; }
.small-title{ font-family:'Cormorant Garamond', serif; font-size:30px; line-height:1.15; margin-bottom:12px; }
.desc{ color:var(--sub); font-size:14px; line-height:1.8; margin-bottom:32px; }

.subject{ margin-bottom:38px; }
.subject-name{ font-size:19px; font-weight:700; margin-bottom:16px; }

.square-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.square-link{ position: relative; aspect-ratio:1/1; background:#f5faf3; border:1px solid #dde9d8; border-radius:24px; padding:20px; display:flex; flex-direction:column; justify-content:space-between; transition:0.24s; overflow: hidden; }
.square-link:hover{ background:white; border-color:var(--point); transform:translateY(-4px); }
.sq-number{ font-size:13px; color:var(--point); font-weight:700; letter-spacing:0.08em; z-index: 2; }
.sq-title{ font-size:17px; font-weight:600; line-height:1.4; z-index: 2; }

/* ✅ 숫자 강조 레이어 (박스 안에서 큼직하게 배치) */
.count-wrapper {
  position: absolute;
  right: 15px;
  bottom: 10px;
  text-align: right;
  z-index: 1;
}
.count-num {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 52px; /* ❗ 숫자를 엄청 크게 키움 */
  line-height: 1;
  font-weight: 700;
  color: var(--point);
  opacity: 0.9;
}
.count-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--sub);
  letter-spacing: 0.05em;
  margin-top: -5px;
  display: block;
}

.sq-status{ align-self: flex-start; font-size:10px; padding:5px 10px; border-radius:999px; font-weight:700; letter-spacing:0.08em; z-index: 2; }
.open{ background:var(--open-bg); color:var(--open); }
.soon{ background:var(--soon-bg); color:var(--soon); opacity: 0.5; }

.side{ display:flex; flex-direction:column; gap:22px; }
.menu{ display:flex; flex-direction:column; gap:12px; }
.link{ display:flex; justify-content:space-between; align-items:center; padding:16px 18px; border-radius:18px; background:#f5faf3; border:1px solid #dde9d8; transition:0.22s; }
.link:hover{ background:white; border-color:var(--point); transform:translateX(4px); }
.left{ display:flex; align-items:center; gap:10px; }
.footer{ margin-top:58px; text-align:center; color:var(--sub); font-size:13px; line-height:1.9; }

@media(max-width:1100px){ .square-grid{ grid-template-columns:repeat(3,1fr); } }
@media(max-width:980px){
  .layout{ grid-template-columns:1fr; }
  .header{ flex-direction:column; text-align:center; }
  .logo{ font-size:56px; }
  .square-grid{ grid-template-columns:repeat(2,1fr); }
  .count-num { font-size: 44px; }
}
